<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%2300ff88%22/><text x=%2250%22 y=%2268%22 font-size=%2248%22 font-weight=%22bold%22 text-anchor=%22middle%22 fill=%22%23060d06%22>SM</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#060d06" />
    <meta name="description" content="SocialMind — Autonomous AI Social Media Agent. Setup once, auto-post forever." />
    <title>SocialMind — AI Social Agent</title>
    <script>
      // Pre-load theme to prevent flash
      (function() {
        try {
          var settings = JSON.parse(localStorage.getItem('socialmind-settings') || '{}');
          if (settings.theme) {
            document.documentElement.setAttribute('data-theme', settings.theme);
          }
        } catch(e) {}
      })();
    </script>
    <style>
      /* Critical loading styles */
      .app-loading {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: #060d06;
        gap: 16px;
      }
      .loading-text {
        color: #00ff88;
        font-family: Inter, sans-serif;
        font-size: 1.25rem;
        font-weight: 700;
        letter-spacing: -0.02em;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
