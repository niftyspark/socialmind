name: SocialMind Auto-Post

on:
  schedule:
    # Runs every 3 hours
    - cron: '0 */3 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI

jobs:
  auto-post:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger autonomous posting
        run: |
          echo "Triggering SocialMind auto-post..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.APP_URL }}/api/cron?force=true" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::error::Auto-post failed with HTTP $HTTP_CODE"
            exit 1
          fi
          
          echo "Auto-post completed successfully!"
